server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → backend container ────────────────────────────────────────
    # All FastAPI routes are proxied here so the browser sees a single origin
    # (http://localhost) and CORS never comes into play.
    location ~ ^/(health|process_text_audio|youtube_process|question|reset) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large audio / video uploads need generous limits
        client_max_body_size    500M;
        proxy_request_buffering off;

        # Long transcription jobs can take several minutes
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  60s;
    }
}